<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shattered Pixel Dungeon - HTML Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a2e;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
        }
        
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .status-bar {
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 100%);
            border: 3px solid #6a6a8a;
            border-radius: 5px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 600px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .hp-bar {
            width: 150px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444 0%, #cc0000 100%);
            transition: width 0.3s;
        }
        
        .xp-bar {
            width: 100px;
            height: 15px;
            background: #333;
            border: 2px solid #555;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #44ff44 0%, #00cc00 100%);
            transition: width 0.3s;
        }
        
        .canvas-container {
            border: 4px solid #6a6a8a;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #000;
        }
        
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }
        
        .log-panel {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a2e 100%);
            border: 3px solid #6a6a8a;
            border-radius: 5px;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.4;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 5px;
            border-radius: 3px;
        }
        
        .log-combat { color: #ff6b6b; }
        .log-item { color: #ffd93d; }
        .log-info { color: #6bcb77; }
        .log-danger { color: #ff4757; }
        .log-level { color: #a55eea; }
        
        .inventory-panel {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a2e 100%);
            border: 3px solid #6a6a8a;
            border-radius: 5px;
            padding: 10px;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        
        .inventory-slot {
            width: 40px;
            height: 40px;
            background: #333;
            border: 2px solid #555;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .inventory-slot:hover {
            border-color: #888;
            background: #444;
        }
        
        .controls-panel {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a2e 100%);
            border: 3px solid #6a6a8a;
            border-radius: 5px;
            padding: 10px;
        }
        
        .controls-list {
            list-style: none;
            font-size: 11px;
            line-height: 1.6;
        }
        
        .controls-list li {
            display: flex;
            justify-content: space-between;
        }
        
        .key {
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-over-content {
            background: linear-gradient(180deg, #4a1a1a 0%, #2a0a0a 100%);
            border: 4px solid #ff4444;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 100%);
            border: 2px solid #6a6a8a;
            color: #fff;
            padding: 10px 30px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: linear-gradient(180deg, #5a5a7a 0%, #3a3a5a 100%);
            border-color: #8a8aaa;
        }
        
        .minimap {
            background: #111;
            border: 2px solid #444;
            border-radius: 5px;
            padding: 5px;
        }
        
        #minimapCanvas {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="main-panel">
            <div class="status-bar">
                <div class="status-item">
                    <span>❤️ HP:</span>
                    <div class="hp-bar">
                        <div class="hp-fill" id="hpFill" style="width: 100%"></div>
                    </div>
                    <span id="hpText">20/20</span>
                </div>
                <div class="status-item">
                    <span>⭐ Nivel:</span>
                    <span id="levelText">1</span>
                </div>
                <div class="status-item">
                    <span>✨ XP:</span>
                    <div class="xp-bar">
                        <div class="xp-fill" id="xpFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="status-item">
                    <span>🏛️ Piso:</span>
                    <span id="floorText">1</span>
                </div>
                <div class="status-item">
                    <span>💰 Oro:</span>
                    <span id="goldText">0</span>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="gameCanvas" width="600" height="480"></canvas>
            </div>
        </div>
        
        <div class="side-panel">
            <div class="minimap">
                <canvas id="minimapCanvas" width="200" height="200"></canvas>
            </div>
            
            <div class="log-panel" id="gameLog">
                <div class="log-entry log-info">Bienvenido a Shattered Pixel Dungeon!</div>
                <div class="log-entry log-info">Explora la mazmorra y sobrevive...</div>
            </div>
            
            <div class="inventory-panel">
                <h4>🎒 Inventario</h4>
                <div class="inventory-grid" id="inventoryGrid"></div>
            </div>
            
            <div class="controls-panel">
                <h4>🎮 Controles</h4>
                <ul class="controls-list">
                    <li><span>Mover/Atacar</span><span class="key">WASD / Flechas</span></li>
                    <li><span>Esperar</span><span class="key">ESPACIO</span></li>
                    <li><span>Recoger item</span><span class="key">G</span></li>
                    <li><span>Usar poción</span><span class="key">R</span></li>
                    <li><span>Descansar</span><span class="key">T</span></li>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOverScreen">
        <div class="game-over-content">
            <h2>☠️ HAS MUERTO ☠️</h2>
            <p id="deathStats"></p>
            <button class="btn" onclick="game.restart()">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        // === SPRITE MANAGER ===
        class SpriteManager {
            constructor() {
                this.sprites = {};
                this.loaded = false;
                this.loadQueue = [];
            }
            
            async loadSprite(name, path) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        this.sprites[name] = img;
                        resolve(img);
                    };
                    img.onerror = () => {
                        console.warn(`Failed to load sprite: ${path}`);
                        resolve(null);
                    };
                    img.src = path;
                });
            }
            
            async loadAllSprites() {
                const promises = [];
                
                // Cargar sprites de enemigos
                const enemies = ['gnoll', 'crab', 'rat', 'bat', 'brute', 'shaman', 'thief', 'snake', 'spider', 'skeleton', 'warlock', 'monk', 'golem', 'elemental', 'wraith', 'spectre', 'bat', 'dm300', 'goo'];
                enemies.forEach(name => {
                    promises.push(this.loadSprite(`enemy_${name}`, `htmlfiles/assets/sprites/${name}.png`));
                });
                
                // Cargar héroe
                promises.push(this.loadSprite('hero_mage', 'htmlfiles/assets/sprites/mage.png'));
                promises.push(this.loadSprite('hero_warrior', 'htmlfiles/assets/sprites/warrior.png'));
                promises.push(this.loadSprite('hero_rogue', 'htmlfiles/assets/sprites/rogue.png'));
                promises.push(this.loadSprite('hero_huntress', 'htmlfiles/assets/sprites/huntress.png'));
                
                // Cargar items
                promises.push(this.loadSprite('item_gold', 'htmlfiles/assets/sprites/gold.png'));
                promises.push(this.loadSprite('item_potion', 'htmlfiles/assets/sprites/potion.png'));
                promises.push(this.loadSprite('item_scroll', 'htmlfiles/assets/sprites/scroll.png'));
                promises.push(this.loadSprite('item_weapon', 'htmlfiles/assets/sprites/weapon.png'));
                promises.push(this.loadSprite('item_armor', 'htmlfiles/assets/sprites/armor.png'));
                promises.push(this.loadSprite('item_food', 'htmlfiles/assets/sprites/food.png'));
                
                // Cargar tiles
                promises.push(this.loadSprite('tile_water', 'htmlfiles/assets/environment/water0.png'));
                
                await Promise.all(promises);
                this.loaded = true;
            }
            
            getSprite(name) {
                return this.sprites[name] || null;
            }
        }

        // === TILE TYPES ===
        const TILES = {
            VOID: 0,
            FLOOR: 1,
            WALL: 2,
            DOOR: 3,
            OPEN_DOOR: 4,
            WATER: 5,
            GRASS: 6,
            STAIRS_UP: 7,
            STAIRS_DOWN: 8,
            CHEST: 9
        };

        // === GAME CONSTANTS ===
        const TILE_SIZE = 24;
        const MAP_WIDTH = 25;
        const MAP_HEIGHT = 20;
        const VIEW_WIDTH = Math.ceil(600 / TILE_SIZE);
        const VIEW_HEIGHT = Math.ceil(480 / TILE_SIZE);

        // === DUNGEON GENERATOR ===
        class DungeonGenerator {
            constructor(width, height) {
                this.width = width;
                this.height = height;
            }
            
            generate(floor) {
                const map = [];
                for (let y = 0; y < this.height; y++) {
                    map[y] = [];
                    for (let x = 0; x < this.width; x++) {
                        map[y][x] = TILES.WALL;
                    }
                }
                
                // Generar habitaciones
                const rooms = [];
                const numRooms = 5 + Math.floor(Math.random() * 4);
                
                for (let i = 0; i < numRooms; i++) {
                    const roomWidth = 4 + Math.floor(Math.random() * 5);
                    const roomHeight = 3 + Math.floor(Math.random() * 4);
                    const roomX = 1 + Math.floor(Math.random() * (this.width - roomWidth - 2));
                    const roomY = 1 + Math.floor(Math.random() * (this.height - roomHeight - 2));
                    
                    let overlaps = false;
                    for (const room of rooms) {
                        if (roomX < room.x + room.width + 1 &&
                            roomX + roomWidth + 1 > room.x &&
                            roomY < room.y + room.height + 1 &&
                            roomY + roomHeight + 1 > room.y) {
                            overlaps = true;
                            break;
                        }
                    }
                    
                    if (!overlaps) {
                        rooms.push({ x: roomX, y: roomY, width: roomWidth, height: roomHeight });
                        
                        for (let ry = roomY; ry < roomY + roomHeight; ry++) {
                            for (let rx = roomX; rx < roomX + roomWidth; rx++) {
                                map[ry][rx] = TILES.FLOOR;
                            }
                        }
                    }
                }
                
                // Conectar habitaciones con pasillos
                for (let i = 1; i < rooms.length; i++) {
                    const room1 = rooms[i - 1];
                    const room2 = rooms[i];
                    
                    const x1 = Math.floor(room1.x + room1.width / 2);
                    const y1 = Math.floor(room1.y + room1.height / 2);
                    const x2 = Math.floor(room2.x + room2.width / 2);
                    const y2 = Math.floor(room2.y + room2.height / 2);
                    
                    // Pasillo horizontal
                    const minX = Math.min(x1, x2);
                    const maxX = Math.max(x1, x2);
                    for (let x = minX; x <= maxX; x++) {
                        if (map[y1][x] === TILES.WALL) {
                            map[y1][x] = TILES.FLOOR;
                        }
                    }
                    
                    // Pasillo vertical
                    const minY = Math.min(y1, y2);
                    const maxY = Math.max(y1, y2);
                    for (let y = minY; y <= maxY; y++) {
                        if (map[y][x2] === TILES.WALL) {
                            map[y][x2] = TILES.FLOOR;
                        }
                    }
                }
                
                // Colocar escaleras
                if (rooms.length > 0) {
                    const startRoom = rooms[0];
                    const endRoom = rooms[rooms.length - 1];
                    
                    map[Math.floor(startRoom.y + startRoom.height / 2)]
                       [Math.floor(startRoom.x + startRoom.width / 2)] = TILES.STAIRS_UP;
                    
                    map[Math.floor(endRoom.y + endRoom.height / 2)]
                       [Math.floor(endRoom.x + endRoom.width / 2)] = TILES.STAIRS_DOWN;
                }
                
                return { map, rooms };
            }
        }

        // === ENTITY CLASSES ===
        class Entity {
            constructor(x, y, sprite) {
                this.x = x;
                this.y = y;
                this.sprite = sprite;
                this.visible = true;
            }
        }

        class Actor extends Entity {
            constructor(x, y, sprite, hp, damage) {
                super(x, y, sprite);
                this.hp = hp;
                this.maxHp = hp;
                this.damage = damage;
                this.level = 1;
                this.xp = 0;
                this.xpToNext = 20;
            }
            
            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp < 0) this.hp = 0;
                return this.hp <= 0;
            }
            
            heal(amount) {
                this.hp += amount;
                if (this.hp > this.maxHp) this.hp = this.maxHp;
            }
            
            gainXp(amount) {
                this.xp += amount;
                while (this.xp >= this.xpToNext) {
                    this.xp -= this.xpToNext;
                    this.level++;
                    this.maxHp += 5;
                    this.heal(5);
                    this.damage += 1;
                    this.xpToNext = Math.floor(this.xpToNext * 1.5);
                }
            }
        }

        class Hero extends Actor {
            constructor(x, y) {
                super(x, y, 'hero_warrior', 20, 3);
                this.gold = 0;
                this.inventory = [];
                this.potions = 0;
            }
        }

        class Enemy extends Actor {
            constructor(x, y, type, floor) {
                const stats = Enemy.getStats(type, floor);
                super(x, y, `enemy_${type}`, stats.hp, stats.damage);
                this.type = type;
                this.xpValue = stats.xp;
                this.state = 'idle';
                this.lastMove = 0;
            }
            
            static getStats(type, floor) {
                const base = {
                    rat: { hp: 10, damage: 2, xp: 5 },
                    gnoll: { hp: 15, damage: 3, xp: 8 },
                    crab: { hp: 20, damage: 4, xp: 10 },
                    bat: { hp: 12, damage: 4, xp: 9 },
                    brute: { hp: 30, damage: 5, xp: 15 },
                    shaman: { hp: 18, damage: 5, xp: 12 },
                    thief: { hp: 16, damage: 4, xp: 11 },
                    snake: { hp: 14, damage: 3, xp: 8 },
                    spider: { hp: 13, damage: 3, xp: 7 },
                    skeleton: { hp: 18, damage: 4, xp: 10 },
                    warlock: { hp: 20, damage: 6, xp: 14 },
                    monk: { hp: 22, damage: 5, xp: 13 },
                    golem: { hp: 40, damage: 6, xp: 20 },
                    elemental: { hp: 35, damage: 7, xp: 18 },
                    wraith: { hp: 25, damage: 5, xp: 15 },
                    spectre: { hp: 30, damage: 6, xp: 17 }
                };
                
                const stats = base[type] || base.rat;
                const multiplier = 1 + (floor - 1) * 0.1;
                
                return {
                    hp: Math.floor(stats.hp * multiplier),
                    damage: Math.floor(stats.damage * multiplier),
                    xp: Math.floor(stats.xp * multiplier)
                };
            }
        }

        class Item extends Entity {
            constructor(x, y, type, value = 0) {
                super(x, y, `item_${type}`);
                this.type = type;
                this.value = value;
            }
        }

        // === MAIN GAME CLASS ===
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.minimapCanvas = document.getElementById('minimapCanvas');
                this.minimapCtx = this.minimapCanvas.getContext('2d');
                
                this.spriteManager = new SpriteManager();
                this.dungeonGenerator = new DungeonGenerator(MAP_WIDTH, MAP_HEIGHT);
                
                this.map = [];
                this.rooms = [];
                this.hero = null;
                this.enemies = [];
                this.items = [];
                this.floor = 1;
                this.gameOver = false;
                
                this.cameraX = 0;
                this.cameraY = 0;
                
                this.setupControls();
                this.start();
            }
            
            async start() {
                await this.spriteManager.loadAllSprites();
                this.log('Cargando sprites...', 'info');
                this.newFloor();
                this.render();
                this.renderMinimap();
                this.updateUI();
                this.log('¡Comienza la aventura!', 'info');
            }
            
            restart() {
                this.floor = 1;
                this.gameOver = false;
                this.hero = new Hero(10, 10);
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('gameLog').innerHTML = '';
                this.newFloor();
                this.render();
                this.renderMinimap();
                this.updateUI();
                this.log('=== Nueva Partida ===', 'info');
            }
            
            newFloor() {
                const { map, rooms } = this.dungeonGenerator.generate(this.floor);
                this.map = map;
                this.rooms = rooms;
                this.enemies = [];
                this.items = [];
                
                // Posicionar héroe
                if (!this.hero) {
                    this.hero = new Hero(10, 10);
                } else {
                    const stairsUp = this.findTile(TILES.STAIRS_UP);
                    if (stairsUp) {
                        this.hero.x = stairsUp.x;
                        this.hero.y = stairsUp.y;
                    }
                }
                
                // Generar enemigos
                const enemyTypes = ['rat', 'gnoll', 'crab', 'bat', 'brute', 'shaman'];
                const numEnemies = 3 + Math.floor(this.floor / 2);
                
                for (let i = 0; i < numEnemies; i++) {
                    const pos = this.getRandomFloorTile();
                    if (pos && this.distance(pos.x, pos.y, this.hero.x, this.hero.y) > 5) {
                        const type = enemyTypes[Math.floor(Math.random() * Math.min(enemyTypes.length, 3 + Math.floor(this.floor / 3)))];
                        this.enemies.push(new Enemy(pos.x, pos.y, type, this.floor));
                    }
                }
                
                // Generar items
                const numItems = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < numItems; i++) {
                    const pos = this.getRandomFloorTile();
                    if (pos) {
                        const rand = Math.random();
                        if (rand < 0.4) {
                            this.items.push(new Item(pos.x, pos.y, 'gold', 5 + Math.floor(Math.random() * 15)));
                        } else if (rand < 0.7) {
                            this.items.push(new Item(pos.x, pos.y, 'potion'));
                        } else {
                            this.items.push(new Item(pos.x, pos.y, 'food'));
                        }
                    }
                }
                
                this.log(`=== Piso ${this.floor} ===`, 'info');
            }
            
            getRandomFloorTile() {
                const attempts = 50;
                for (let i = 0; i < attempts; i++) {
                    const x = Math.floor(Math.random() * MAP_WIDTH);
                    const y = Math.floor(Math.random() * MAP_HEIGHT);
                    if (this.map[y][x] === TILES.FLOOR && !this.getEnemyAt(x, y)) {
                        return { x, y };
                    }
                }
                return null;
            }
            
            findTile(tileType) {
                for (let y = 0; y < MAP_HEIGHT; y++) {
                    for (let x = 0; x < MAP_WIDTH; x++) {
                        if (this.map[y][x] === tileType) {
                            return { x, y };
                        }
                    }
                }
                return null;
            }
            
            distance(x1, y1, x2, y2) {
                return Math.abs(x1 - x2) + Math.abs(y1 - y2);
            }
            
            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (this.gameOver) return;
                    
                    let dx = 0, dy = 0;
                    let acted = false;
                    
                    switch(e.key) {
                        case 'ArrowUp': case 'w': case 'W': dy = -1; break;
                        case 'ArrowDown': case 's': case 'S': dy = 1; break;
                        case 'ArrowLeft': case 'a': case 'A': dx = -1; break;
                        case 'ArrowRight': case 'd': case 'D': dx = 1; break;
                        case ' ': 
                            this.log('Esperas un turno...', 'info');
                            acted = true;
                            break;
                        case 'g': case 'G':
                            this.pickupItem();
                            acted = true;
                            break;
                        case 'r': case 'R':
                            this.usePotion();
                            acted = true;
                            break;
                        case 't': case 'T':
                            this.rest();
                            acted = true;
                            break;
                    }
                    
                    if (dx !== 0 || dy !== 0) {
                        this.moveHero(dx, dy);
                        acted = true;
                    }
                    
                    if (acted) {
                        this.processEnemies();
                        this.render();
                        this.renderMinimap();
                        this.updateUI();
                    }
                });
            }
            
            moveHero(dx, dy) {
                const newX = this.hero.x + dx;
                const newY = this.hero.y + dy;
                
                // Verificar colisión con paredes
                if (this.map[newY][newX] === TILES.WALL) {
                    return;
                }
                
                // Verificar enemigo
                const enemy = this.getEnemyAt(newX, newY);
                if (enemy) {
                    this.attackEnemy(enemy);
                    return;
                }
                
                // Mover
                this.hero.x = newX;
                this.hero.y = newY;
                
                // Verificar escaleras
                if (this.map[newY][newX] === TILES.STAIRS_DOWN) {
                    this.floor++;
                    this.newFloor();
                }
            }
            
            attackEnemy(enemy) {
                const damage = this.hero.damage + Math.floor(Math.random() * 2);
                const killed = enemy.takeDamage(damage);
                
                this.log(`Atacas al ${enemy.type} por ${damage} daño`, 'combat');
                
                if (killed) {
                    this.log(`¡${enemy.type} derrotado! +${enemy.xpValue} XP`, 'level');
                    this.hero.gainXp(enemy.xpValue);
                    this.enemies = this.enemies.filter(e => e !== enemy);
                }
            }
            
            processEnemies() {
                for (const enemy of this.enemies) {
                    const dist = this.distance(enemy.x, enemy.y, this.hero.x, this.hero.y);
                    
                    if (dist <= 1) {
                        // Atacar héroe
                        const damage = Math.max(1, enemy.damage - Math.floor(Math.random()));
                        this.hero.takeDamage(damage);
                        this.log(`${enemy.type} te ataca por ${damage} daño`, 'danger');
                        
                        if (this.hero.hp <= 0) {
                            this.endGame();
                        }
                    } else if (dist <= 8) {
                        // Perseguir héroe
                        const dx = Math.sign(this.hero.x - enemy.x);
                        const dy = Math.sign(this.hero.y - enemy.y);
                        
                        let newX = enemy.x + dx;
                        let newY = enemy.y + dy;
                        
                        if (this.canMoveTo(newX, newY)) {
                            enemy.x = newX;
                            enemy.y = newY;
                        } else if (dx !== 0 && this.canMoveTo(enemy.x, enemy.y + dy)) {
                            enemy.y += dy;
                        } else if (dy !== 0 && this.canMoveTo(enemy.x + dx, enemy.y)) {
                            enemy.x += dx;
                        }
                    }
                }
            }
            
            canMoveTo(x, y) {
                return this.map[y][x] !== TILES.WALL && !this.getEnemyAt(x, y) && !(x === this.hero.x && y === this.hero.y);
            }
            
            getEnemyAt(x, y) {
                return this.enemies.find(e => e.x === x && e.y === y);
            }
            
            pickupItem() {
                const itemIndex = this.items.findIndex(i => i.x === this.hero.x && i.y === this.hero.y);
                if (itemIndex === -1) {
                    this.log('No hay nada aquí', 'info');
                    return;
                }
                
                const item = this.items[itemIndex];
                
                if (item.type === 'gold') {
                    this.hero.gold += item.value;
                    this.log(`Recogiste ${item.value} oro`, 'item');
                } else if (item.type === 'potion') {
                    this.hero.potions++;
                    this.log('Recogiste una poción (R para usar)', 'item');
                } else if (item.type === 'food') {
                    this.hero.heal(5);
                    this.log('Comiste comida (+5 HP)', 'item');
                }
                
                this.items.splice(itemIndex, 1);
            }
            
            usePotion() {
                if (this.hero.potions > 0) {
                    this.hero.potions--;
                    const healAmount = 10 + Math.floor(Math.random() * 5);
                    this.hero.heal(healAmount);
                    this.log(`Bebiste una poción (+${healAmount} HP)`, 'item');
                } else {
                    this.log('No tienes pociones', 'info');
                }
            }
            
            rest() {
                let healed = false;
                if (this.hero.hp < this.hero.maxHp) {
                    this.hero.heal(2);
                    healed = true;
                }
                this.log(healed ? 'Descansas y recuperas 2 HP' : 'Descansas...', 'info');
            }
            
            endGame() {
                this.gameOver = true;
                document.getElementById('deathStats').innerHTML = `
                    <p>Piso alcanzado: ${this.floor}</p>
                    <p>Nivel: ${this.hero.level}</p>
                    <p>Oro: ${this.hero.gold}</p>
                `;
                document.getElementById('gameOverScreen').style.display = 'flex';
                this.log('☠️ HAS MUERTO ☠️', 'danger');
            }
            
            log(message, type = 'info') {
                const logPanel = document.getElementById('gameLog');
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                entry.textContent = message;
                logPanel.appendChild(entry);
                logPanel.scrollTop = logPanel.scrollHeight;
            }
            
            updateUI() {
                const hpPercent = (this.hero.hp / this.hero.maxHp) * 100;
                const xpPercent = (this.hero.xp / this.hero.xpToNext) * 100;
                
                document.getElementById('hpFill').style.width = `${hpPercent}%`;
                document.getElementById('hpText').textContent = `${this.hero.hp}/${this.hero.maxHp}`;
                document.getElementById('xpFill').style.width = `${xpPercent}%`;
                document.getElementById('levelText').textContent = this.hero.level;
                document.getElementById('floorText').textContent = this.floor;
                document.getElementById('goldText').textContent = this.hero.gold;
                
                // Actualizar inventario
                const invGrid = document.getElementById('inventoryGrid');
                invGrid.innerHTML = '';
                for (let i = 0; i < 20; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'inventory-slot';
                    if (i < this.hero.potions) {
                        slot.textContent = '🧪';
                    }
                    invGrid.appendChild(slot);
                }
            }
            
            render() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Calcular cámara
                this.cameraX = Math.max(0, Math.min(this.hero.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
                this.cameraY = Math.max(0, Math.min(this.hero.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
                
                // Renderizar mapa
                for (let y = 0; y < VIEW_HEIGHT; y++) {
                    for (let x = 0; x < VIEW_WIDTH; x++) {
                        const mapX = x + this.cameraX;
                        const mapY = y + this.cameraY;
                        
                        if (mapY >= MAP_HEIGHT || mapX >= MAP_WIDTH) continue;
                        
                        const tile = this.map[mapY][mapX];
                        const screenX = x * TILE_SIZE;
                        const screenY = y * TILE_SIZE;
                        
                        // Dibujar tile
                        this.drawTile(tile, screenX, screenY);
                    }
                }
                
                // Renderizar items
                for (const item of this.items) {
                    const screenX = (item.x - this.cameraX) * TILE_SIZE;
                    const screenY = (item.y - this.cameraY) * TILE_SIZE;
                    
                    if (screenX >= 0 && screenX < this.canvas.width &&
                        screenY >= 0 && screenY < this.canvas.height) {
                        this.drawItem(item, screenX, screenY);
                    }
                }
                
                // Renderizar enemigos
                for (const enemy of this.enemies) {
                    const screenX = (enemy.x - this.cameraX) * TILE_SIZE;
                    const screenY = (enemy.y - this.cameraY) * TILE_SIZE;
                    
                    if (screenX >= 0 && screenX < this.canvas.width &&
                        screenY >= 0 && screenY < this.canvas.height) {
                        this.drawEnemy(enemy, screenX, screenY);
                    }
                }
                
                // Renderizar héroe
                const heroScreenX = (this.hero.x - this.cameraX) * TILE_SIZE;
                const heroScreenY = (this.hero.y - this.cameraY) * TILE_SIZE;
                this.drawHero(heroScreenX, heroScreenY);
            }
            
            drawTile(tile, x, y) {
                const ctx = this.ctx;
                
                switch(tile) {
                    case TILES.WALL:
                        ctx.fillStyle = '#4a4a6a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#5a5a7a';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        break;
                    case TILES.FLOOR:
                        ctx.fillStyle = '#3a3a5a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#4a4a6a';
                        ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        break;
                    case TILES.STAIRS_DOWN:
                        ctx.fillStyle = '#3a3a5a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#8a8aaa';
                        ctx.beginPath();
                        ctx.moveTo(x + 4, y + 16);
                        ctx.lineTo(x + 12, y + 8);
                        ctx.lineTo(x + 20, y + 16);
                        ctx.fill();
                        break;
                    case TILES.STAIRS_UP:
                        ctx.fillStyle = '#3a3a5a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#8a8aaa';
                        ctx.beginPath();
                        ctx.moveTo(x + 4, y + 8);
                        ctx.lineTo(x + 12, y + 16);
                        ctx.lineTo(x + 20, y + 8);
                        ctx.fill();
                        break;
                    case TILES.DOOR:
                        ctx.fillStyle = '#5a4a3a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        break;
                    default:
                        ctx.fillStyle = '#2a2a4a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                }
            }
            
            drawHero(x, y) {
                const sprite = this.spriteManager.getSprite('hero_warrior');
                if (sprite) {
                    this.ctx.drawImage(sprite, x, y, TILE_SIZE, TILE_SIZE);
                } else {
                    this.ctx.fillStyle = '#4a9eff';
                    this.ctx.beginPath();
                    this.ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }
            
            drawEnemy(enemy, x, y) {
                const sprite = this.spriteManager.getSprite(`enemy_${enemy.type}`);
                if (sprite) {
                    this.ctx.drawImage(sprite, x, y, TILE_SIZE, TILE_SIZE);
                } else {
                    this.ctx.fillStyle = '#ff4444';
                    this.ctx.beginPath();
                    this.ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                // Barra de HP del enemigo
                const hpPercent = enemy.hp / enemy.maxHp;
                this.ctx.fillStyle = '#333';
                this.ctx.fillRect(x, y - 4, TILE_SIZE, 3);
                this.ctx.fillStyle = hpPercent > 0.5 ? '#4f4' : '#f44';
                this.ctx.fillRect(x, y - 4, TILE_SIZE * hpPercent, 3);
            }
            
            drawItem(item, x, y) {
                const sprite = this.spriteManager.getSprite(`item_${item.type}`);
                if (sprite) {
                    this.ctx.drawImage(sprite, x, y, TILE_SIZE, TILE_SIZE);
                } else {
                    switch(item.type) {
                        case 'gold':
                            this.ctx.fillStyle = '#ffd700';
                            this.ctx.beginPath();
                            this.ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2, 6, 0, Math.PI * 2);
                            this.ctx.fill();
                            break;
                        case 'potion':
                            this.ctx.fillStyle = '#ff6b6b';
                            this.ctx.fillRect(x + 8, y + 4, 8, 14);
                            break;
                        case 'food':
                            this.ctx.fillStyle = '#8b4513';
                            this.ctx.beginPath();
                            this.ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2, 8, 6, 0, 0, Math.PI * 2);
                            this.ctx.fill();
                            break;
                    }
                }
            }
            
            renderMinimap() {
                const ctx = this.minimapCtx;
                const scale = 200 / Math.max(MAP_WIDTH, MAP_HEIGHT);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 200, 200);
                
                // Dibujar mapa
                for (let y = 0; y < MAP_HEIGHT; y++) {
                    for (let x = 0; x < MAP_WIDTH; x++) {
                        const tile = this.map[y][x];
                        if (tile === TILES.WALL) {
                            ctx.fillStyle = '#444';
                        } else if (tile === TILES.STAIRS_DOWN) {
                            ctx.fillStyle = '#0f0';
                        } else if (tile === TILES.STAIRS_UP) {
                            ctx.fillStyle = '#00f';
                        } else {
                            ctx.fillStyle = '#666';
                        }
                        ctx.fillRect(x * scale, y * scale, scale, scale);
                    }
                }
                
                // Dibujar enemigos
                ctx.fillStyle = '#f00';
                for (const enemy of this.enemies) {
                    ctx.fillRect(enemy.x * scale, enemy.y * scale, scale, scale);
                }
                
                // Dibujar héroe
                ctx.fillStyle = '#0ff';
                ctx.fillRect(this.hero.x * scale, this.hero.y * scale, scale + 2, scale + 2);
            }
        }

        // === START GAME ===
        const game = new Game();
    </script>
